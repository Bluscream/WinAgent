pc_notify_toast:
  url: "http://192.168.2.50:23482/api/notify"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
    accept: "application/json"
    content_type: "application/json; charset=utf-8"
  payload: >
    {
      "message": "{{ message }}",
      "title": "{{ title | default('Notification') }}",
      "toast": true
    }

blu_pc_notify:
  url: "http://192.168.2.50:23482/api/notify"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: >
    {{ payload | to_json }}

blu_pc_screenshot:
  url: "http://192.168.2.50:23482/api/capture/screenshot"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
    content_type: "application/json"
  payload: >
    {
      "desktop": "{{ desktop | default('Default') }}",
      "quality": {{ quality | default(75) }},
      "display": "{{ display | default('all') }}",
      "format": "{{ format | default('png') }}",
      "base64": {{ base64 | default(false) | lower }}
    }

blu_pc_toggle_block:
  url: "http://192.168.2.50:23482/api/toggle-block"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"enabled": {{ enabled | lower }}}'

blu_pc_toggle_force:
  url: "http://192.168.2.50:23482/api/toggle-force"
  method: POST
  headers:
    Authorization: "Bearer 7f46fda81f4d4b51878cdf01aca45804"
  content_type: "application/json"
  payload: '{"enabled": {{ enabled | lower }}}'

blu_pc_execute:
